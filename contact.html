<form action="#" method="post">
    <div style="margin-bottom: 10px;">
        <label>姓名：</label><br>
        <input type="text" name="name" required>
    </div>
    <div style="margin-bottom: 10px;">
        <label>邮箱：</label><br>
        <input type="email" name="email" required>
    </div>
    <div style="margin-bottom: 10px;">
        <label>留言：</label><br>
        <textarea name="message" rows="5" required></textarea>
    </div>
    <button type="submit">发送消息</button>
</form>
